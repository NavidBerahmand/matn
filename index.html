<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مَتن — کتابخانه‌ٔ دانلود</title>
  <meta name="description" content="کتابخانه‌ٔ کوچک کتاب‌های PDF فارسی، با نسخه‌ٔ روشن و تاریک برای مطالعه." />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <nav class="nav">
    <button type="button" class="nav__brand" id="home" aria-label="خانه">مَتن</button>
    <div class="nav__links">
      <a href="#books">کتاب‌ها</a>
      <button id="search-toggle" class="nav__btn" type="button" aria-expanded="false">جستجو</button>
    </div>
  </nav>

  <div id="filter-bar" class="filter-bar" hidden>
    <span class="filter-bar__label">نمایش:</span>
    <button id="filter-chip" class="filter-chip" type="button"></button>
  </div>

  <div id="search-panel" class="search-panel" hidden>
    <input id="search-input" class="search-input" type="search"
           placeholder="جستجوی عنوان یا نویسنده…" autocomplete="off" />
    <span id="search-meta" class="search-meta"></span>
  </div>

  <main id="books">
    <section id="grid" class="grid"><!-- cards injected by app.js --></section>
    <div id="grid-sentinel" aria-hidden="true"></div>
    <p id="empty-note" class="empty-note"></p>
  </main>

  <!-- Modal -->
  <div id="modal-backdrop" class="modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="m-title">
      <div class="modal__head">
        <span class="t" id="m-title"></span>
        <button id="modal-close" class="modal__close" type="button" aria-label="بستن">[ بستن ]</button>
      </div>
      <p class="modal__desc" id="m-desc"></p>
      <div class="modal__rows" id="m-rows"></div>
      <div class="modal__tags" id="m-tags"></div>
      <div class="modal__cover" id="m-cover"></div>
      <div class="dl">
        <button id="dl-light" class="light" type="button">دانلود نسخه‌ٔ روشن</button>
        <button id="dl-dark" class="dark" type="button">دانلود نسخه‌ٔ تاریک</button>
      </div>
    </div>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
