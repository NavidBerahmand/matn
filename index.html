<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مَتن — کتابخانه‌ٔ دانلود</title>
  <meta name="description" content="کتابخانه‌ٔ کوچک کتاب‌های PDF فارسی، با نسخه‌ٔ روشن و تاریک برای مطالعه." />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <nav class="nav">
    <div class="nav__brand">مَتن</div>
    <div class="nav__links">
      <a href="#books">کتاب‌ها</a>
      <button id="theme-toggle" class="theme-toggle" type="button">تاریک</button>
    </div>
  </nav>

  <header class="head">
    <h1>کتابخانه‌ٔ مَتن</h1>
    <p>مجموعه‌ای کوچک از کتاب‌های فارسی، آماده‌ٔ دانلود. هر کتاب در دو نسخه‌ٔ روشن و تاریک برای مطالعه‌ٔ راحت‌تر در روز و شب.</p>
  </header>

  <main id="books">
    <section id="grid" class="grid"><!-- cards injected by app.js --></section>
    <p id="empty-note" class="empty-note"></p>
  </main>

  <!-- Modal -->
  <div id="modal-backdrop" class="modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="m-title">
      <div class="modal__head">
        <span class="t" id="m-title"></span>
        <button id="modal-close" class="modal__close" type="button" aria-label="بستن">[ بستن ]</button>
      </div>
      <p class="modal__desc" id="m-desc"></p>
      <div class="modal__rows" id="m-rows"></div>
      <div class="modal__tags" id="m-tags"></div>
      <div class="modal__cover" id="m-cover"></div>
      <div class="dl">
        <button id="dl-light" class="light" type="button">دانلود نسخه‌ٔ روشن</button>
        <button id="dl-dark" class="dark" type="button">دانلود نسخه‌ٔ تاریک</button>
      </div>
    </div>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
